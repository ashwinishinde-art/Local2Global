<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Your Order | Local2Global</title>

<link rel="stylesheet" href="order.css">



</head>

<body>

<header>

<div class="back">
<i class="fa-solid fa-arrow-left"></i>
<h2>Review Your Order</h2>
</div>

<div class="step">
STEP 1/2
</div>

</header>

<div class="offer">

🎉 ₹50 OFF on your first village purchase

</div>

<div class="product-card">

<div class="product-details">

<h3>Homemade Mango Pickle</h3>

<p>by Savita Patil</p>

<p class="village">
📍 Satara Village
</p>

<div class="price">

<span class="new">₹220</span>

<span class="old">₹300</span>

<span class="discount">27% OFF</span>

</div>

<p>Qty : 1</p>

</div>
</div>

<div class="address">

<h3>📍 Delivery Address</h3>

<form class="address-form">

<div class="row">

<div class="input-group">
<label>Full Name</label>
<input type="text" placeholder="Full Name">
</div>

<div class="input-group">
<label>Mobile Number</label>
<input type="text" placeholder="Mobile Number">
</div>

</div>

<div class="row">

<div class="input-group">
<label>House No.</label>
<input type="text" placeholder="House No">
</div>

<div class="input-group">
<label>Street</label>
<input type="text" placeholder="Street">
</div>

</div>

<div class="row">

<div class="input-group">
<label>City</label>
<input type="text" placeholder="City">
</div>

<div class="input-group">
<label>State</label>
<input type="text" placeholder="State">
</div>

</div>

<div class="row">

<div class="input-group">
<label>Pincode</label>
<input type="text" placeholder="Pincode">
</div>

<div class="input-group">
<label>Landmark</label>
<input type="text" placeholder="Landmark">
</div>

</div>

<button class="save-btn">
Save Address
</button>

</form>

</div>

<div class="small-box">

<span>🚚 Shipping : ₹40</span>

<span>🎁 Discount : ₹30</span>

</div>

<div class="total-box">

<span>Total Amount</span>

<span class="total-price">₹230</span>

</div>



<div class="bottom">

<div>

<h2>₹230</h2>

<p>You Saved ₹70</p>

</div>

<a href="order_success.html">
    <button>Continue</button>
</a>

</div>
   
</body>
</html>
